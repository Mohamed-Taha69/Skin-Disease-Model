project:
  name: monkeypox-classification-colab
  seed: 42
  output_dir: /content/outputs
  checkpoints_dir: /content/checkpoints
  logs_dir: /content/logs

data:
  # بعد ما تشغّل split_data.py على كولاب هيبقى عندك الفولدرات دي
  train_dir: /content/drive/MyDrive/data/train
  val_dir: /content/drive/MyDrive/data/val
  test_dir: /content/drive/MyDrive/data/test 
  num_classes: 4
  class_names: ["Monkeypox", "Chickenpox", "Measles", "Normal"]
  img_size: 224
  num_workers: 2
  sampler: null          # أو weighted_plus لو هتدعّمها بعدين
  oversample_factors: [1.0, 1.0, 1.0, 1.0]
  minority_aug: false
  hard_mining: false

train:
  model: efficientnet_b3
  pretrained: true
  epochs: 35
  batch_size: 16
  lr: 0.0001             # نفس اللي في الكونفج البسيط
  weight_decay: 0.01
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 0
  loss: cross_entropy     # تقدر تغيّرها لو عايز focal بعدين
  class_weights: null     # أو [1,1,1,1] لو هتستخدم أوزان
  mixup: 0.0
  cutmix: 0.0
  label_smoothing: 0.05
  early_stopping_patience: 7
  kfold:
    enabled: true
    n_splits: 5
    shuffle: true
    random_state: 42

aug:
  hflip: 0.5
  vflip: 0.15
  rotate: 25
  color_jitter: [0.15, 0.15, 0.15, 0.05]
  random_crop: true
  random_erasing: 0.1
  affine: null

infer:
  tta: 4
